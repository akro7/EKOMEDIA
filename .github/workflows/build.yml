name: EKO MEDIA Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.2 --distribution-type bin

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Debug APK
        id: build_debug
        run: ./gradlew assembleDebug --stacktrace 2>&1 | tee build_debug.txt; exit ${PIPESTATUS[0]}

      - name: Build Release APK
        id: build_release
        run: ./gradlew assembleRelease --stacktrace 2>&1 | tee build_release.txt; exit ${PIPESTATUS[0]}

      - name: Generate Failure Report
        if: failure()
        run: |
          python3 << 'EOF'
          import re
          from datetime import datetime

          def read(p):
              try:
                  with open(p, 'r', errors='ignore') as f: return f.read()
              except: return ""

          debug_log   = read("build_debug.txt")
          release_log = read("build_release.txt")
          build_log   = debug_log + "\n" + release_log
          now = datetime.now().strftime("%Y-%m-%d %H:%M:%S")

          lines = build_log.split('\n')
          error_keywords = ['error:', 'FAILED', 'Exception', 'Could not',
                            'Caused by:', 'BUILD FAILED', 'Unresolved reference',
                            'not found', 'cannot find symbol']

          errors = []
          for i, line in enumerate(lines):
              if any(k in line for k in error_keywords):
                  start = max(0, i - 2)
                  end   = min(len(lines), i + 8)
                  block = '\n'.join(lines[start:end])
                  if block not in errors:
                      errors.append(block)

          kotlin_errors = re.findall(r'(e: .+\.kt:\(\d+,\d+\): .+)', build_log)
          failed_tasks  = re.findall(r'> Task (.+?) FAILED', build_log)

          report = []
          report.append("=" * 70)
          report.append("  EKO MEDIA BUILD FAILURE REPORT")
          report.append(f"  Date: {now}")
          report.append("  Project: com.eko.media | compileSdk 34 | minSdk 24")
          report.append("=" * 70)

          report.append("\n[ FAILED TASKS ]")
          report.append("-" * 70)
          if failed_tasks:
              for t in set(failed_tasks): report.append(f"  x {t}")
          else:
              report.append("  No specific tasks found")

          report.append("\n[ KOTLIN ERRORS ]")
          report.append("-" * 70)
          if kotlin_errors:
              for err in kotlin_errors[:30]:
                  report.append(f"  {err.strip()}")
          else:
              report.append("  No Kotlin errors found")

          report.append("\n[ FULL ERROR BLOCKS ]")
          report.append("-" * 70)
          for i, err in enumerate(errors[:20], 1):
              report.append(f"\n--- Error #{i} ---")
              report.append(err)

          report.append("\n[ FULL BUILD LOG ]")
          report.append("-" * 70)
          report.append(build_log)

          report_text = '\n'.join(report)
          with open("BUILD_FAILURE_REPORT.txt", 'w') as f:
              f.write(report_text)

          print(report_text[:3000])
          print("\n--- Full report saved to BUILD_FAILURE_REPORT.txt")
          EOF

      - name: Upload Failure Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: BUILD-FAILURE-REPORT-${{ github.run_number }}
          path: BUILD_FAILURE_REPORT.txt
          retention-days: 30

      - name: Sign Release APK
        if: success() && env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release.jks
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks release.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass pass:"$STORE_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          rm -f release.jks

      - name: Get version info
        if: success()
        id: version
        run: |
          VERSION=$(grep "versionName" app/build.gradle | awk '{print $2}' | tr -d '"' | head -1)
          CODE=$(grep "versionCode" app/build.gradle | awk '{print $2}' | head -1)
          echo "version_name=${VERSION:-1.0-AKRO}" >> $GITHUB_OUTPUT
          echo "version_code=${CODE:-1}" >> $GITHUB_OUTPUT
          echo "build_date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: EkoMedia-Debug-v${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.build_date }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: EkoMedia-Release-v${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.build_date }}
          path: |
            app/build/outputs/apk/release/*-unsigned.apk
            app/build/outputs/apk/release/*-signed.apk
          retention-days: 30

      - name: Create GitHub Release
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: EkoMedia v${{ steps.version.outputs.version_name }}
          body: |
            ## EkoMedia v${{ steps.version.outputs.version_name }}
            - **Build:** ${{ steps.version.outputs.version_code }}
            - **Date:** ${{ steps.version.outputs.build_date }}
            - **SDK:** compileSdk 34 | minSdk 24 | targetSdk 34
            - **Kotlin:** 1.9.22 | **AGP:** 8.2.2
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
